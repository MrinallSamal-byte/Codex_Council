# RepoCouncil App Platform spec.
# This service deploys from the repo-root Dockerfile and relies on the container entrypoint
# in deployment/scripts/start.sh for runtime preflight checks, schema sync, and startup.
# Set DATABASE_URL and OPENROUTER_API_KEY as encrypted RUN_TIME variables in App Platform.

name: repocouncil
region: blr

services:
  - name: web
    environment_slug: node-js
    github:
      repo: MrinallSamal-byte/Codex_Council
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/health
      initial_delay_seconds: 25
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_APP_URL
        value: ${APP_URL}
        scope: RUN_TIME
        type: general
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: general
      - key: PORT
        value: "3000"
        scope: RUN_TIME
        type: general
      - key: HOSTNAME
        value: 0.0.0.0
        scope: RUN_TIME
        type: general
      - key: DEMO_MODE
        value: "false"
        scope: RUN_TIME
        type: general
      - key: REPO_STORAGE_ROOT
        value: /tmp/repocouncil/workspaces
        scope: RUN_TIME
        type: general
      - key: EXPORT_STORAGE_ROOT
        value: /tmp/repocouncil/exports
        scope: RUN_TIME
        type: general
      - key: ANALYSIS_MAX_CONCURRENCY
        value: "1"
        scope: RUN_TIME
        type: general
      - key: ASK_MAX_CONCURRENCY
        value: "1"
        scope: RUN_TIME
        type: general
      - key: ASK_MAX_ACTIVE_AGENTS
        value: "2"
        scope: RUN_TIME
        type: general
      - key: ASK_MAX_PARTICIPANTS
        value: "6"
        scope: RUN_TIME
        type: general
      - key: LOG_LEVEL
        value: info
        scope: RUN_TIME
        type: general
      - key: RUN_DB_PUSH_ON_START
        value: "true"
        scope: RUN_TIME
        type: general
      - key: DB_CONNECT_MAX_RETRIES
        value: "10"
        scope: RUN_TIME
        type: general
      - key: RECOVER_RUNNING_RUNS_ON_START
        value: "true"
        scope: RUN_TIME
        type: general
      - key: NODE_OPTIONS
        value: --max-old-space-size=768
        scope: RUN_TIME
        type: general
